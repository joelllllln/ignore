<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Idle Dot Shooter</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="stage">
  <canvas id="game" width="1152" height="648"></canvas>

  <!-- UI layer is sized to the logical 1152x648 and scaled to match the canvas -->
  <div id="ui-root">
    <!-- top: speed / difficulty slider -->
    <div id="bar">
      <span class="bar-label">SPEED / DIFFICULTY</span>
      <input type="range" id="slider" min="0.5" max="3.0" step="0.1" value="1.0" />
      <span id="diff-val">1.0x</span>
    </div>

    <!-- top-left stats -->
    <pre id="stats"></pre>

    <!-- right-side upgrade panel -->
    <div id="panel">
      <div class="panel-title">— UPGRADES —</div>
      <button class="up-btn" id="btn-dmg"></button>
      <button class="up-btn" id="btn-rate"></button>
      <button class="up-btn" id="btn-cannon"></button>
      <button class="up-btn" id="btn-wall"></button>
    </div>

    <!-- game over -->
    <div id="gameover">
      <pre id="go-text"></pre>
      <button id="btn-restart">RESTART</button>
    </div>
  </div>
</div>
<script src="js/game.js"></script>
</body>
</html>
